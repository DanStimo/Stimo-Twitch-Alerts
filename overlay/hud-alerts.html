<!DOCTYPE html>
<html>
<head>
<title>HUD Alerts</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: Consolas, monospace;
}

#hud {
    position: absolute;

    left: 0;
    top: 0;

    width: 1920px;
    height: 1080px;

    pointer-events: none;
}

.panel {
    position: absolute;

    top: 40px;
    left: 50%;

    transform: translateX(-50%);

    width: 700px;
    height: 120px;

    display: grid;
    grid-template-columns: 1fr 120px 1fr;
    align-items: center;
    padding-bottom: 24px;
    

    background:
        linear-gradient(
            90deg,
            rgba(0,0,0,0.70),
            rgba(0,217,255,0.10),
            rgba(0,0,0,0.70)
        );

    border-top: 2px solid rgba(0,217,255,0.75);
    border-bottom: 2px solid rgba(0,217,255,0.45);
    border-left: 1px solid rgba(0,217,255,0.25);
    border-right: 1px solid rgba(0,217,255,0.25);

    box-shadow:
        0 0 10px rgba(0,217,255,0.18),
        inset 0 0 28px rgba(0,0,0,0.65);
    animation: hudFloat 8s ease-in-out infinite;
}

@keyframes hudFloat {
    0%, 100% {
        transform: translateX(-50%) translateY(0px);
    }

    50% {
        transform: translateX(-50%) translateY(-3px);
    }
}

.side {
    padding: 0 26px;
}

.row {
    position: relative;
    z-index: 2;

    display: flex;
    align-items: center;
    gap: 10px;

    margin: 8px 0;

    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;

    color: rgba(255,255,255,0.95);

    text-shadow:
        0 0 8px rgba(255,255,255,0.22);
}

.label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #00d9ff;
    opacity: 1;
    text-shadow: 0 0 8px rgba(0,217,255,0.8);
    }

.value {
    white-space: nowrap;
}

.core {
    width: 92px;
    height: 92px;

    margin: auto;

    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;

    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 18px;

    background:
        radial-gradient(circle, rgba(0,217,255,0.28), rgba(0,0,0,0.22));

    box-shadow:
        0 0 18px rgba(0,217,255,0.7),
        inset 0 0 18px rgba(255,255,255,0.25);

    animation: corePulse 3s ease-in-out infinite;
}

.core-inner {
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
    text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 22px rgba(0,217,255,0.9);
}

.core::before {
    content: "";

    position: absolute;
    inset: -40%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.12),
            transparent
        );

    animation: coreSweep 4s linear infinite;
}

@keyframes coreSweep {
    from {
        transform: translateX(-120%);
    }

    to {
        transform: translateX(120%);
    }
}

.counts {
    position: absolute;

    bottom: 4px;
    left: 50%;

    transform: translateX(-50%);

    font-size: 10px;
    line-height: 1.4;
    letter-spacing: 3px;

    color: rgba(255,255,255,0.72);
}

.flash {
    animation: flashUpdate 0.8s ease;
}

@keyframes corePulse {
    0%, 100% {
        transform: scale(1);
        box-shadow:
            0 0 18px rgba(0,217,255,0.7),
            inset 0 0 18px rgba(255,255,255,0.25);
    }

    50% {
        transform: scale(1.04);
        box-shadow:
            0 0 34px rgba(0,217,255,0.95),
            inset 0 0 24px rgba(255,255,255,0.35);
    }
}

@keyframes flashUpdate {
    0% {
        transform: scale(1.08);
        filter: brightness(1.8);
    }

    100% {
        transform: scale(1);
        filter: brightness(1);
    }
}

.flash-follow {
    animation: followPulse 0.8s ease;
}

.flash-sub {
    animation: subPulse 0.8s ease;
}

.flash-tip {
    animation: tipPulse 0.8s ease;
}

.flash-raid {
    animation: raidPulse 0.8s ease;
}

@keyframes followPulse {
    0% {
        box-shadow: 0 0 45px rgba(0,217,255,1);
    }

    100% {
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }
}

@keyframes subPulse {
    0% {
        box-shadow: 0 0 45px rgba(180,80,255,1);
        border-color: rgba(180,80,255,1);
    }

    100% {
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }
}

@keyframes tipPulse {
    0% {
        box-shadow: 0 0 45px rgba(255,200,80,1);
        border-color: rgba(255,200,80,1);
    }

    100% {
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }
}

@keyframes raidPulse {
    0% {
        box-shadow: 0 0 45px rgba(255,80,80,1);
        border-color: rgba(255,80,80,1);
    }

    100% {
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }
}
</style>
</head>

<body>

<div id="hud">
    <div class="panel" id="panel">

        <div class="side">
            <div class="label">LATEST FOLLOW</div>
            <div class="row">
                <span>✦</span>
                <span class="value" id="latestFollow">WAITING</span>
            </div>

            <div class="label">LATEST SUB</div>
            <div class="row">
                <span>⬡</span>
                <span class="value" id="latestSub">WAITING</span>
            </div>
        </div>

        <div class="core">
            <div class="core-inner">S</div>
        </div>

        <div class="side">
            <div class="label">LATEST TIP</div>
            <div class="row">
                <span>◆</span>
                <span class="value" id="latestTip">WAITING</span>
            </div>

            <div class="label">LATEST RAID</div>
            <div class="row">
                <span>▲</span>
                <span class="value" id="latestRaid">WAITING</span>
            </div>
        </div>

        <div class="counts" id="counts">
            FOLLOWERS 0 • SUBS 0 • BITS 0 • RAIDS 0
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const latestFollow = document.getElementById("latestFollow");
const latestSub = document.getElementById("latestSub");
const latestTip = document.getElementById("latestTip");
const latestRaid = document.getElementById("latestRaid");
const counts = document.getElementById("counts");
const panel = document.getElementById("panel");

let state = {
    follows: 0,
    subs: 0,
    bits: 0,
    raids: 0
};

function flash(type = "default") {

    panel.classList.remove(
        "flash-follow",
        "flash-sub",
        "flash-tip",
        "flash-raid",
        "flash-default"
    );

    void panel.offsetWidth;

    panel.classList.add(`flash-${type}`);

    setTimeout(() => {
        panel.classList.remove(`flash-${type}`);
    }, 900);
}

function updateCounts(history) {
    const totals = history.totals || {};

    state.follows = totals.follows || 0;
    state.subs = (totals.subs || 0) + (totals.primesubs || 0) + (totals.giftsubs || 0);
    state.bits = totals.totalBits || 0;
    state.raids = totals.raids || 0;

    counts.textContent =
        `FOLLOWERS ${state.follows} • SUBS ${state.subs} • BITS ${state.bits} • RAIDS ${state.raids}`;
}

function loadFromHistory(history) {
    if ((history.follows || [])[0]) {
        latestFollow.textContent = history.follows[0].user;
    }

    if ((history.subs || [])[0]) {
        latestSub.textContent = history.subs[0].user;
    }

    if ((history.primesubs || [])[0]) {
        latestSub.textContent = history.primesubs[0].user + " • PRIME";
    }

    if ((history.tips || [])[0]) {
        latestTip.textContent = history.tips[0].user + " • " + history.tips[0].extra;
    }

    if ((history.raids || [])[0]) {
        latestRaid.textContent = history.raids[0].user + " • " + history.raids[0].extra;
    }

    updateCounts(history);
}

socket.on("alert", (data) => {

    let flashType = "default";

    if (data.type === "follow") {
        latestFollow.textContent = data.user;
        flashType = "follow";
    }

    if (data.type === "sub") {
        latestSub.textContent = `${data.user} • ${data.extra || ""}`;
        flashType = "sub";
    }

    if (data.type === "primesub") {
        latestSub.textContent = `${data.user} • PRIME`;
        flashType = "sub";
    }

    if (data.type === "giftsub") {
        latestSub.textContent = data.user;
        flashType = "sub";
    }

    if (data.type === "tip") {
        latestTip.textContent = `${data.user} • ${data.extra || ""}`;
        flashType = "tip";
    }

    if (data.type === "raid") {
        latestRaid.textContent = `${data.user} • ${data.extra || ""}`;
        flashType = "raid";
    }

    if (data.history) {
        updateCounts(data.history);
    }

    flash(flashType);
});

fetch("/api/alert-history")
    .then(res => res.json())
    .then(loadFromHistory);
</script>

</body>
</html>
