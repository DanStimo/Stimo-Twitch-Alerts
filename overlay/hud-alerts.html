<!DOCTYPE html>
<html>
<head>
<title>HUD Alert Chips</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: Consolas, monospace;
}

#hud {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
}

.chip-row {
    position: absolute;
    top: 42px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: flex-start;
    justify-content: center;

    gap: 14px;
}

.chip {
    width: 310px;
    height: 42px;
    box-sizing: border-box;

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 0 16px;

    background: linear-gradient(
        90deg,
        rgba(0,0,0,0.62),
        rgba(0,217,255,0.08)
    );

    border-left: 2px solid var(--chip-color);
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(255,255,255,0.08);

    color: white;
    text-transform: uppercase;

    box-shadow:
        0 0 12px rgba(0,0,0,0.7),
        inset 0 0 18px rgba(255,255,255,0.04);

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;

    overflow: hidden;
    position: relative;

    column-gap: 12px;
}

@keyframes chipIdle {
    0%, 100% {
        transform: translateY(0px);
    }

    50% {
        transform: translateY(-1px);
    }
}

.chip::before {
    content: "";

    position: absolute;
    inset: -40%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.08),
            transparent
        );

    transform: translateX(-120%);
    animation: chipSweep 8s linear infinite;
    opacity: 0.4;
}

@keyframes chipSweep {
    to {
        transform: translateX(140%);
    }
}

.chip.expanded::before {
    animation: chipSweep 2.5s linear infinite;
}

.chip-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--chip-color);
    font-weight: 900;

    line-height: 1;
    transform: translateY(1px);
}

.chip-value {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;

    line-height: 1;

    text-shadow: 0 0 8px rgba(255,255,255,0.45);
}

.chip.active {
    
    background: linear-gradient(
        90deg,
        rgba(0,0,0,0.75),
        color-mix(in srgb, var(--chip-color) 28%, transparent)
    );

    box-shadow:
        0 0 28px var(--chip-color),
        inset 0 0 22px rgba(255,255,255,0.12);
}

.chip.expanded {
    z-index: 50;

    height: 72px;

    transform: translateY(-10px);

    background:
        linear-gradient(
            90deg,
            rgba(0,0,0,0.92),
            color-mix(in srgb, var(--chip-color) 38%, transparent)
        );

    box-shadow:
        0 0 42px var(--chip-color),
        inset 0 0 28px rgba(255,255,255,0.12);

    overflow: visible;
}

.chip-extra {
    opacity: 0;

    font-size: 8px;
    letter-spacing: 2px;
    font-weight: 900;

    color: rgba(255,255,255,0.72);

    transform: translateY(6px);

    transition:
        opacity 0.25s ease,
        transform 0.25s ease;
}

.chip-text {
    display: flex;
    flex-direction: column;
    justify-content: center;

    gap: 4px;

    transition: transform 0.25s ease;
}

.chip.expanded .chip-extra {
    opacity: 1;
    transform: translateY(0);
}

.core {
    width: 48px;
    height: 48px;

    display: flex;
    align-items: center;
    justify-content: center;

    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 14px;

    background: radial-gradient(
        circle,
        rgba(0,217,255,0.32),
        rgba(0,0,0,0.52)
    );

    color: white;

    font-size: 24px;
    font-weight: 900;

    text-shadow: 0 0 12px rgba(255,255,255,0.9);

    box-shadow:
        0 0 22px rgba(0,217,255,0.45);

    animation: coreIdle 4s ease-in-out infinite;

    overflow: hidden;
    position: relative;
}

.core-logo {
    width: 70%;
    height: 70%;

    object-fit: contain;

    filter:
        drop-shadow(0 0 12px rgba(255,255,255,0.65))
        drop-shadow(0 0 22px rgba(0,217,255,0.55));

    animation: logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat {
    0%, 100% {
        transform: scale(1) rotate(0deg);
    }

    50% {
        transform: scale(1.04) rotate(1deg);
    }
}

.core.pulse {
    animation: coreHit 0.75s ease;
}

.sub-train {
    position: absolute;
    top: 118px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);

    width: 240px;
    padding: 4px 8px;

    background: rgba(0,0,0,0.42);
    border-top: 1px solid rgba(184,77,255,0.45);

    color: white;
    text-transform: uppercase;

    opacity: 0;
    pointer-events: none;

    transition:
        opacity 0.35s ease,
        transform 0.35s ease,
        box-shadow 0.35s ease;
}

.sub-train.running {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.sub-train.running {
    opacity: 1;
}

.train-top {
    display: flex;
    justify-content: space-between;

    font-size: 8px;
    letter-spacing: 2px;

    color: #b84dff;
}

.train-bar {
    width: 100%;
    height: 3px;
    position: relative;

    margin-top: 3px;
    height: 3px;

    background: rgba(255,255,255,0.12);
    overflow: hidden;
}

.train-fill {
    width: 0%;
    height: 100%;

    background: linear-gradient(
        90deg,
        #b84dff,
        #ffffff
    );

    transition: width 0.5s ease-out;
}

.train-timer {
    margin-top: 2px;

    font-size: 8px;
    letter-spacing: 1px;

    color: rgba(255,255,255,0.65);
}

@keyframes coreIdle {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }

    50% {
        transform: scale(1.04);
        box-shadow: 0 0 30px rgba(0,217,255,0.65);
    }
}

@keyframes coreHit {
    0% {
        transform: scale(1.22) rotate(4deg);
        box-shadow: 0 0 42px white;
    }

    100% {
        transform: scale(1) rotate(0deg);
        box-shadow: 0 0 22px rgba(0,217,255,0.45);
    }
}

.sub-train.active {
    box-shadow:
        0 0 18px rgba(184,77,255,0.55),
        inset 0 0 12px rgba(255,255,255,0.06);

    border-top-color: rgba(184,77,255,0.9);
}

.train-bar::after {
    content: "";

    position: absolute;
    inset: 0;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.18),
            transparent
        );

    animation: trainSweep 2s linear infinite;
}

.train-bar {
    position: relative;
}

@keyframes trainSweep {
    from {
        transform: translateX(-100%);
    }

    to {
        transform: translateX(100%);
    }
}

#trainCount.bump {
    animation: trainBump 0.4s ease;
}

@keyframes trainBump {
    0% {
        transform: scale(1);
    }

    40% {
        transform: scale(1.45);
        text-shadow: 0 0 18px white;
    }

    100% {
        transform: scale(1);
    }
}

.sub-train.running {
    animation: trainIdlePulse 3s ease-in-out infinite;
}

@keyframes trainIdlePulse {
    0%, 100% {
        transform: translateX(-50%) scale(1);
    }

    50% {
        transform: translateX(-50%) scale(1.01);
    }
}

.hud-glow {
    position: absolute;

    top: 20px;
    left: 50%;

    transform: translateX(-50%);

    width: 1200px;
    height: 160px;

    background:
        radial-gradient(
            ellipse at center,
            rgba(0,217,255,0.07),
            transparent 70%
        );

    filter: blur(18px);

    animation: hudGlow 6s ease-in-out infinite;

    pointer-events: none;
}

@keyframes hudGlow {
    0%, 100% {
        opacity: 0.45;
    }

    50% {
        opacity: 0.85;
    }
}
    
</style>
</head>

<body>

<div id="hud">
    <div class="hud-glow"></div>
    <div class="chip-row">

    <div class="chip" id="chipFollow" style="--chip-color:#00d9ff">
        <div class="chip-label">FOLLOW</div>

        <div class="chip-text">
            <div class="chip-value" id="latestFollow">WAITING</div>
            <div class="chip-extra" id="extraFollow">
                NEW SIGNAL DETECTED
            </div>
        </div>
    </div>

    <div class="chip" id="chipSub" style="--chip-color:#b84dff">
        <div class="chip-label">SUB</div>

        <div class="chip-text">
            <div class="chip-value" id="latestSub">WAITING</div>
            <div class="chip-extra" id="extraSub">
                SIGNAL VERIFIED
            </div>
        </div>
    </div>

    <div class="core" id="core">
        <img src="assets/images/Stimo.png" class="core-logo">
    </div>

    <div class="chip" id="chipTip" style="--chip-color:#ffdd66">
        <div class="chip-label">TIP</div>

        <div class="chip-text">
            <div class="chip-value" id="latestTip">WAITING</div>
            <div class="chip-extra" id="extraTip">
                CREDITS RECEIVED
            </div>
        </div>
    </div>

    <div class="chip" id="chipBits" style="--chip-color:#00ff99">
        <div class="chip-label">BITS</div>

        <div class="chip-text">
            <div class="chip-value" id="latestBits">WAITING</div>
            <div class="chip-extra" id="extraBits">
                ENERGY TRANSFER
            </div>
        </div>
    </div>

</div>

    <div class="sub-train" id="subTrain">
        <div class="train-top">
            <span>SUB TRAIN</span>
            <span id="trainCount">00</span>
        </div>
    
        <div class="train-bar">
            <div class="train-fill" id="trainFill"></div>
        </div>
    
        <div class="train-timer" id="trainTimer">
            STANDING BY
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const latestFollow = document.getElementById("latestFollow");
const latestSub = document.getElementById("latestSub");
const latestTip = document.getElementById("latestTip");
const latestBits = document.getElementById("latestBits");
const subTrain = document.getElementById("subTrain");
const trainCount = document.getElementById("trainCount");
const trainFill = document.getElementById("trainFill");
const trainTimer = document.getElementById("trainTimer");
const core = document.getElementById("core");

const chips = {
    follow: document.getElementById("chipFollow"),
    sub: document.getElementById("chipSub"),
    primesub: document.getElementById("chipSub"),
    giftsub: document.getElementById("chipSub"),
    tip: document.getElementById("chipTip"),
    bits: document.getElementById("chipBits")
};

const chipExtras = {
    follow: document.getElementById("extraFollow"),
    sub: document.getElementById("extraSub"),
    primesub: document.getElementById("extraSub"),
    giftsub: document.getElementById("extraSub"),
    tip: document.getElementById("extraTip"),
    bits: document.getElementById("extraBits")
};

function expandChip(type, message) {
    const chip = chips[type];
    const extra = chipExtras[type];

    if (!chip) return;

    if (extra && message) {
        extra.textContent = message;
    }

    chip.classList.remove("expanded");
    void chip.offsetWidth;
    chip.classList.add("expanded");

    setTimeout(() => {
        chip.classList.remove("expanded");
    }, 3000);
}

function pulse(type) {
    const chip = chips[type];

    if (chip) {
        chip.classList.remove("active");
        void chip.offsetWidth;
        chip.classList.add("active");

        setTimeout(() => {
            chip.classList.remove("active");
        }, 1100);
    }

    core.classList.remove("pulse");
    void core.offsetWidth;
    core.classList.add("pulse");

    setTimeout(() => {
        core.classList.remove("pulse");
    }, 800);
}

let trainActive = false;
let trainCountValue = 0;
let trainEndsAt = 0;
let trainInterval = null;

function startSubTrain(addAmount = 1) {
    trainActive = true;
    trainCountValue = Math.min(
        trainCountValue + addAmount,
        999
    );

    // 5 minute train window
    trainEndsAt = Date.now() + (5 * 60 * 1000);

    trainCount.textContent = String(trainCountValue).padStart(2, "0");

    trainCount.classList.remove("bump");
    void trainCount.offsetWidth;
    trainCount.classList.add("bump");

    if (!trainInterval) {
        trainInterval = setInterval(updateSubTrainTimer, 500);
    }

    updateSubTrainTimer();

    subTrain.classList.remove("active");
    void subTrain.offsetWidth;
    subTrain.classList.add("active");
    
    setTimeout(() => {
        subTrain.classList.remove("active");
    }, 700);

    subTrain.classList.add("running");
    
}

function updateSubTrainTimer() {
    if (!trainActive) {
        trainFill.style.width = "0%";
        trainTimer.textContent = "STANDING BY";
        return;
    }

    const remaining = Math.max(0, trainEndsAt - Date.now());
    const total = 5 * 60 * 1000;

    const percent = (remaining / total) * 100;

    if (remaining <= 30000) {
        subTrain.style.borderTopColor = "#ff4444";
        trainTimer.style.color = "#ff8888";
    }
    else {
        subTrain.style.borderTopColor = "rgba(184,77,255,0.45)";
        trainTimer.style.color = "rgba(255,255,255,0.65)";
    }

    trainFill.style.width = `${percent}%`;

    if (trainCountValue >= 25) {
        trainFill.style.background =
            "linear-gradient(90deg,#ff4dff,#ffffff)";
    }
    else if (trainCountValue >= 10) {
        trainFill.style.background =
            "linear-gradient(90deg,#b84dff,#ffffff)";
    }
    else {
        trainFill.style.background =
            "linear-gradient(90deg,#7a2cff,#ffffff)";
    }

    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    trainTimer.textContent =
        `SUB TRAIN ACTIVE • ${mins}:${String(secs).padStart(2, "0")}`;

    if (remaining <= 0) {
        trainActive = false;
        trainCountValue = 0;
        trainTimer.textContent = "TRAIN ENDED";
        trainFill.style.width = "0%";
        subTrain.classList.remove("running");

        clearInterval(trainInterval);
        trainInterval = null;

        setTimeout(() => {
            trainTimer.textContent = "STANDING BY";
            trainCount.textContent = "00";
        }, 3000);
    }
}
    
function updateCounts(history) {
 //   const totals = history.totals || {};

 //   const follows = totals.follows || 0;
 //   const subs = (totals.subs || 0) + (totals.primesubs || 0) + (totals.giftsubs || 0);
 //   const bits = totals.totalBits || 0;
 //   const raids = totals.raids || 0;

 //   counts.textContent = `FOLLOWERS ${follows} • SUBS ${subs} • BITS ${bits} • RAIDS ${raids}`;
}

function formatGiftSubText(user, extra, reward) {
    const rawUser = String(user || "").trim();
    const rawExtra = String(extra || "").trim();

    // Multi gift already arrives like: TESTGIFTER GIFTED X6
    if (/GIFTED\s+X?\d+/i.test(rawUser)) {
        return rawUser;
    }

    // Single gift: user = TESTGIFTER ◆ TESTRECEIVER, extra = TESTGIFTER
    if (reward) {
        return `${rawExtra || rawUser.split("◆")[0].trim()} GIFTED X1`;
    }

    const countMatch = rawExtra.match(/(\d+)/) || rawUser.match(/(\d+)/);
    const count = countMatch ? countMatch[1] : "1";

    const gifter = rawUser.split("◆")[0].split("♦")[0].trim();

    return `${gifter} GIFTED X${count}`;
}
    
function loadFromHistory(history) {
    if ((history.follows || [])[0]) {
        latestFollow.textContent = history.follows[0].user;
    }

    if ((history.subs || [])[0]) {
        latestSub.textContent = history.subs[0].user + " • " + history.subs[0].extra;
    }

    if ((history.primesubs || [])[0]) {
        latestSub.textContent = history.primesubs[0].user + " • PRIME";
    }

    if ((history.giftsubs || [])[0]) {
        const gift = history.giftsubs[0];
    
        latestSub.textContent = formatGiftSubText(
            gift.user,
            gift.extra,
            gift.reward
        );
    }

    if ((history.tips || [])[0]) {
        latestTip.textContent = history.tips[0].user + " • " + history.tips[0].extra;
    }

    if ((history.bits || [])[0]) {
        latestBits.textContent = history.bits[0].user + " • " + history.bits[0].extra;
    }

    updateCounts(history);
}

socket.on("alert", (data) => {
    if (data.type === "follow") {
        latestFollow.textContent = data.user;
        expandChip("follow", "NEW SIGNAL DETECTED");
    }

    if (data.type === "sub") {
        latestSub.textContent = `${data.user} • ${data.extra || ""}`;
        startSubTrain(1);
        expandChip("sub", "LOYALTY SIGNAL VERIFIED");
    }

    if (data.type === "primesub") {
        latestSub.textContent = `${data.user} • PRIME`;
        startSubTrain(1);
        expandChip("sub", "PRIME LINK VERIFIED");
    }

    if (data.type === "giftsub") {

        latestSub.textContent = formatGiftSubText(
            data.user,
            data.extra,
            data.reward
        );
    
        expandChip("giftsub", "SUB TRAIN BOOSTED");
    
        const giftAmount =
            parseInt(
                String(data.user || data.extra || "")
                    .match(/(\d+)/)?.[0] || "1",
                10
            );
    
        startSubTrain(giftAmount);
    }

    if (data.type === "tip") {
        latestTip.textContent = `${data.user} • ${data.extra || ""}`;
        expandChip("tip", "CREDITS RECEIVED");
    }

    if (data.type === "bits") {
        latestBits.textContent = `${data.user} • ${data.extra || ""}`;
        expandChip("bits", "ENERGY TRANSFER COMPLETE");
    }

    if (data.history) {
        updateCounts(data.history);
    }

    pulse(data.type);
});

fetch("/api/alert-history")
    .then(res => res.json())
    .then(loadFromHistory);
</script>

</body>
</html>
