<!DOCTYPE html>
<html>
<head>
<title>HUD Alert Chips</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: Consolas, monospace;
}

#hud {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
}

.chip-row {
    position: absolute;
    top: 42px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;
    justify-content: center;

    gap: 14px;
}

.chip {
    width: 310px;
    height: 36px;
    box-sizing: border-box;

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 0 16px;

    background: linear-gradient(
        90deg,
        rgba(0,0,0,0.62),
        rgba(0,217,255,0.08)
    );

    border-left: 2px solid var(--chip-color);
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(255,255,255,0.08);

    color: white;
    text-transform: uppercase;

    box-shadow:
        0 0 12px rgba(0,0,0,0.7),
        inset 0 0 18px rgba(255,255,255,0.04);

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
    animation: chipIdle 5s ease-in-out infinite;
    
    overflow: hidden;
    position: relative;
}

@keyframes chipIdle {
    0%, 100% {
        transform: translateY(0px);
    }

    50% {
        transform: translateY(-2px);
    }
}

.chip::before {
    content: "";

    position: absolute;
    inset: -40%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.08),
            transparent
        );

    transform: translateX(-120%);
    animation: chipSweep 5s linear infinite;
}

@keyframes chipSweep {
    to {
        transform: translateX(140%);
    }
}

.chip-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--chip-color);
    font-weight: 900;
}

.chip-value {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;

    text-shadow: 0 0 8px rgba(255,255,255,0.45);
}

.chip.active {
    transform: translateY(-7px) scale(1.12);

    background: linear-gradient(
        90deg,
        rgba(0,0,0,0.75),
        color-mix(in srgb, var(--chip-color) 28%, transparent)
    );

    box-shadow:
        0 0 28px var(--chip-color),
        inset 0 0 22px rgba(255,255,255,0.12);
}

.core {
    width: 48px;
    height: 48px;

    display: flex;
    align-items: center;
    justify-content: center;

    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 14px;

    background: radial-gradient(
        circle,
        rgba(0,217,255,0.32),
        rgba(0,0,0,0.52)
    );

    color: white;

    font-size: 24px;
    font-weight: 900;

    text-shadow: 0 0 12px rgba(255,255,255,0.9);

    box-shadow:
        0 0 22px rgba(0,217,255,0.45);

    animation: coreIdle 4s ease-in-out infinite;

    overflow: hidden;
    position: relative;
}

.core-logo {
    width: 70%;
    height: 70%;

    object-fit: contain;

    filter:
        drop-shadow(0 0 12px rgba(255,255,255,0.65))
        drop-shadow(0 0 22px rgba(0,217,255,0.55));

    animation: logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat {
    0%, 100% {
        transform: scale(1) rotate(0deg);
    }

    50% {
        transform: scale(1.04) rotate(1deg);
    }
}

.core.pulse {
    animation: coreHit 0.75s ease;
}

.count-strip {
    position: absolute;
    top: 104px;
    left: 50%;
    transform: translateX(-50%);

    padding: 5px 16px;

    background: rgba(0,0,0,0.38);
    border-top: 1px solid rgba(0,217,255,0.24);

    color: rgba(255,255,255,0.52);

    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

@keyframes coreIdle {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 18px rgba(0,217,255,0.35);
    }

    50% {
        transform: scale(1.04);
        box-shadow: 0 0 30px rgba(0,217,255,0.65);
    }
}

@keyframes coreHit {
    0% {
        transform: scale(1.22) rotate(4deg);
        box-shadow: 0 0 42px white;
    }

    100% {
        transform: scale(1) rotate(0deg);
        box-shadow: 0 0 22px rgba(0,217,255,0.45);
    }
}
</style>
</head>

<body>

<div id="hud">
    <div class="chip-row">

        <div class="chip" id="chipFollow" style="--chip-color:#00d9ff">
            <div class="chip-label">FOLLOW</div>
            <div class="chip-value" id="latestFollow">WAITING</div>
        </div>

        <div class="chip" id="chipSub" style="--chip-color:#b84dff">
            <div class="chip-label">SUB</div>
            <div class="chip-value" id="latestSub">WAITING</div>
        </div>

        <div class="core" id="core">
            <img src="assets/images/Stimo.png" class="core-logo">
        </div>

        <div class="chip" id="chipTip" style="--chip-color:#ffdd66">
            <div class="chip-label">TIP</div>
            <div class="chip-value" id="latestTip">WAITING</div>
        </div>

        <div class="chip" id="chipBits" style="--chip-color:#00ff99">
            <div class="chip-label">BITS</div>
            <div class="chip-value" id="latestBits">WAITING</div>
        </div>

    </div>

    <div class="count-strip" id="counts">
        FOLLOWERS 0 • SUBS 0 • BITS 0
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const latestFollow = document.getElementById("latestFollow");
const latestSub = document.getElementById("latestSub");
const latestTip = document.getElementById("latestTip");
const latestBits = document.getElementById("latestBits");
const counts = document.getElementById("counts");
const core = document.getElementById("core");

const chips = {
    follow: document.getElementById("chipFollow"),
    sub: document.getElementById("chipSub"),
    primesub: document.getElementById("chipSub"),
    giftsub: document.getElementById("chipSub"),
    tip: document.getElementById("chipTip"),
    bits: document.getElementById("chipBits")
};

function pulse(type) {
    const chip = chips[type];

    if (chip) {
        chip.classList.remove("active");
        void chip.offsetWidth;
        chip.classList.add("active");

        setTimeout(() => {
            chip.classList.remove("active");
        }, 1100);
    }

    core.classList.remove("pulse");
    void core.offsetWidth;
    core.classList.add("pulse");

    setTimeout(() => {
        core.classList.remove("pulse");
    }, 800);
}

function updateCounts(history) {
    const totals = history.totals || {};

    const follows = totals.follows || 0;
    const subs = (totals.subs || 0) + (totals.primesubs || 0) + (totals.giftsubs || 0);
    const bits = totals.totalBits || 0;
    const raids = totals.raids || 0;

    counts.textContent = `FOLLOWERS ${follows} • SUBS ${subs} • BITS ${bits} • RAIDS ${raids}`;
}

function loadFromHistory(history) {
    if ((history.follows || [])[0]) {
        latestFollow.textContent = history.follows[0].user;
    }

    if ((history.subs || [])[0]) {
        latestSub.textContent = history.subs[0].user + " • " + history.subs[0].extra;
    }

    if ((history.primesubs || [])[0]) {
        latestSub.textContent = history.primesubs[0].user + " • PRIME";
    }

    if ((history.giftsubs || [])[0]) {

        const gift = history.giftsubs[0];
    
        const count = gift.extra || "1";
    
        latestSub.textContent =
            `${gift.user} GIFTED X${count}`;
    }

    if ((history.tips || [])[0]) {
        latestTip.textContent = history.tips[0].user + " • " + history.tips[0].extra;
    }

    if ((history.bits || [])[0]) {
        latestBits.textContent = history.bits[0].user + " • " + history.bits[0].extra;
    }

    updateCounts(history);
}

socket.on("alert", (data) => {
    if (data.type === "follow") {
        latestFollow.textContent = data.user;
    }

    if (data.type === "sub") {
        latestSub.textContent = `${data.user} • ${data.extra || ""}`;
    }

    if (data.type === "primesub") {
        latestSub.textContent = `${data.user} • PRIME`;
    }

    if (data.type === "giftsub") {
    
        const count = data.extra || "1";
    
        latestSub.textContent =
            `${data.user} GIFTED X${count}`;
    }

    if (data.type === "tip") {
        latestTip.textContent = `${data.user} • ${data.extra || ""}`;
    }

    if (data.type === "bits") {
        latestBits.textContent = `${data.user} • ${data.extra || ""}`;
    }

    if (data.history) {
        updateCounts(data.history);
    }

    pulse(data.type);
});

fetch("/api/alert-history")
    .then(res => res.json())
    .then(loadFromHistory);
</script>

</body>
</html>
