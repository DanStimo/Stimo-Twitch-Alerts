<!DOCTYPE html>
<html>
<head>
<title>Stream Starting</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Consolas, monospace;
}

.video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    animation: slowZoom 35s ease-in-out infinite alternate;
}

@keyframes slowZoom {
    from {
        transform: scale(1);
    }

    to {
        transform: scale(1.06);
    }
}

.overlay {
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.75)),
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.85));
    box-shadow: inset 0 0 220px rgba(0,0,0,0.8);
}

.scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 3px,
        transparent 7px
    );
    animation: scan 2s linear infinite;
    pointer-events: none;
}

.dust {
    position: absolute;
    inset: 0;

    background-image:
        radial-gradient(rgba(255,255,255,0.12) 1px, transparent 1px);

    background-size: 180px 180px;

    opacity: 0.22;

    animation: dustMove 60s linear infinite;

    pointer-events: none;
}

@keyframes dustMove {
    from {
        transform: translateY(0);
    }

    to {
        transform: translateY(-180px);
    }
}

.content {
    position: absolute;
    left: 90px;
    bottom: 190px;
    width: 900px;
    color: white;
    text-transform: uppercase;
}

.status {
    display: inline-block;
    padding: 6px 14px;
    margin-bottom: 18px;

    font-size: 13px;
    letter-spacing: 5px;

    color: #00d9ff;
    border: 1px solid rgba(0,217,255,0.7);
    background: rgba(0,217,255,0.08);

    text-shadow: 0 0 10px #00d9ff;
}

.title {
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 10px;
    line-height: 1.2;

    color: rgba(255,255,255,0.95);

    text-shadow:
        0 0 12px rgba(255,255,255,0.8),
        0 0 35px rgba(0,217,255,0.35);
}

.title::after {
    content: "";
    display: block;

    margin-top: 18px;

    width: 620px;
    height: 2px;

    background: linear-gradient(
        90deg,
        #00d9ff,
        rgba(255,255,255,0.7),
        transparent
    );
}

.lore {
    margin-top: 20px;

    width: 760px;
    padding: 18px 22px;
    min-height: 58px;
    display: flex;
    align-items: center;

    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 2px;

    color: rgba(255,255,255,0.72);

    background: rgba(0,0,0,0.32);
    border-left: 2px solid #00d9ff;

    text-shadow: 0 0 8px rgba(0,217,255,0.45);

    transition: opacity 0.4s ease;
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="assets/videos/Starting.webm" type="video/webm">
</video>

<div class="overlay"></div>
<div class="scanlines"></div>
<div class="dust"></div>

<div class="content">
    <div class="status">BROADCAST RELAY ONLINE</div>
    <div class="title">MISSION BRIEFING<br>IN PROGRESS</div>
    <div class="lore"></div>
</div>
    
<script>
const loreLines = [
    "Systems are coming online. Flight telemetry is syncing.",
    "Long range communications established with Stanton relay.",
    "Quantum navigation systems are calibrating.",
    "Traffic control has cleared the channel for broadcast.",
    "Awaiting final launch confirmation from command.",
    "Synchronising fleet telemetry and comms uplink."
];

let loreIndex = 0;
const loreEl = document.querySelector(".lore");

function typeLore(text, callback) {
    let i = 0;
    loreEl.textContent = "";

    const timer = setInterval(() => {
        loreEl.textContent = text.substring(0, i);
        i++;

        if (i > text.length) {
            clearInterval(timer);
            setTimeout(callback, 3000);
        }
    }, 35);
}

function eraseLore(callback) {
    let text = loreEl.textContent;
    let i = text.length;

    const timer = setInterval(() => {
        loreEl.textContent = text.substring(0, i);
        i--;

        if (i < 0) {
            clearInterval(timer);
            callback();
        }
    }, 18);
}

function playLoreLoop() {
    typeLore(loreLines[loreIndex], () => {
        eraseLore(() => {
            loreIndex = (loreIndex + 1) % loreLines.length;
            playLoreLoop();
        });
    });
}

playLoreLoop();
</script>
    
</body>
</html>
