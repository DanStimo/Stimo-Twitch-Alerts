<!DOCTYPE html>
<html>
<head>
<title>Stream Starting</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family:
    Consolas,
        "Segoe UI Emoji",
        "Apple Color Emoji",
        "Noto Color Emoji",
        monospace;
}

.video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    animation: slowZoom 35s ease-in-out infinite alternate;
}

@keyframes slowZoom {
    from {
        transform: scale(1);
    }

    to {
        transform: scale(1.06);
    }
}

.overlay {
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.75)),
        linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.85));
    box-shadow: inset 0 0 220px rgba(0,0,0,0.8);
}

.scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 3px,
        transparent 7px
    );
    animation: scan 2s linear infinite;
    pointer-events: none;
}

.dust {
    position: absolute;
    inset: 0;

    background-image:
        radial-gradient(rgba(255,255,255,0.12) 1px, transparent 1px);

    background-size: 180px 180px;

    opacity: 0.22;

    animation: dustMove 60s linear infinite;

    pointer-events: none;
}

@keyframes dustMove {
    from {
        transform: translateY(0);
    }

    to {
        transform: translateY(-180px);
    }
}

.content {
    position: absolute;
    left: 90px;
    bottom: 190px;
    width: 900px;
    color: white;
    text-transform: uppercase;
}

.status {
    display: inline-block;
    padding: 6px 14px;
    margin-bottom: 18px;

    font-size: 13px;
    letter-spacing: 5px;

    color: #00d9ff;
    border: 1px solid rgba(0,217,255,0.7);
    background: rgba(0,217,255,0.08);

    text-shadow: 0 0 10px #00d9ff;
}

.title {
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 10px;
    line-height: 1.2;

    color: rgba(255,255,255,0.95);

    text-shadow:
        0 0 12px rgba(255,255,255,0.8),
        0 0 35px rgba(0,217,255,0.35);
}

.title::after {
    content: "";
    display: block;

    margin-top: 18px;

    width: 620px;
    height: 2px;

    background: linear-gradient(
        90deg,
        #00d9ff,
        rgba(255,255,255,0.7),
        transparent
    );
}

.lore {
    margin-top: 20px;

    width: 760px;
    padding: 18px 22px;
    min-height: 30px;
    display: flex;
    align-items: center;

    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 2px;

    color: rgba(255,255,255,0.72);

    background: rgba(0,0,0,0.32);
    border-left: 2px solid #00d9ff;

    text-shadow: 0 0 8px rgba(0,217,255,0.45);

    transition: opacity 0.4s ease;
}

.chat-panel {
    position: absolute;
    right: 90px;
    bottom: 180px;

    width: 430px;
    height: 520px;

    background: rgba(0,0,0,0.42);

    border-left: 2px solid rgba(0,217,255,0.9);
    border-right: 1px solid rgba(255,255,255,0.08);
    border-top: 1px solid rgba(0,217,255,0.35);
    border-bottom: 1px solid rgba(0,217,255,0.25);

    box-shadow:
        0 0 28px rgba(0,217,255,0.18),
        inset 0 0 22px rgba(255,255,255,0.04);

    overflow: hidden;

    backdrop-filter: blur(10px);
}

.chat-title {
    height: 36px;

    display: flex;
    align-items: center;

    padding-left: 16px;

    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 900;

    color: #00d9ff;
    text-transform: uppercase;

    border-bottom: 1px solid rgba(0,217,255,0.25);

    text-shadow: 0 0 10px #00d9ff;
}

.chat-messages {
    position: absolute;

    top: 50px;
    left: 16px;
    right: 16px;
    bottom: 16px;

    display: flex;
    flex-direction: column;
    justify-content: flex-end;

    gap: 14px;

    overflow: hidden;
}

.chat-message {
    font-family:
        Consolas,
        "Segoe UI Emoji",
        "Apple Color Emoji",
        "Noto Color Emoji",
        monospace;
    font-size: 15px;
    line-height: 1.45;

    color: white;

    word-wrap: break-word;
    overflow-wrap: break-word;

    animation: chatIn 0.35s ease forwards;

    opacity: 0;

    transform: translateY(12px);

    text-shadow:
        0 0 10px rgba(0,217,255,0.18);
    padding-left: 10px;
    border-left: 2px solid rgba(0,217,255,0.35);
}

.chat-user {
    font-weight: 900;
}

.chat-text {
    color: rgba(255,255,255,0.8);
}

@keyframes chatIn {

    from {
        opacity: 0;
        transform: translateY(12px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}

.chat-emote {
    height: 28px;

    vertical-align: middle;

    margin: 0 2px;
}

.chat-message.new-message {
    animation:
        chatIn 0.35s ease forwards,
        messagePulse 1.2s ease;
}

@keyframes messagePulse {
    0% {
        text-shadow: 0 0 18px rgba(0,217,255,0.9);
    }

    100% {
        text-shadow: 0 0 10px rgba(0,217,255,0.18);
    }
}

.chat-meta {
    display: flex;
    justify-content: space-between;
    gap: 8px;

    margin-bottom: 2px;
}

.chat-time {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="assets/videos/Intermission.webm" type="video/webm">
</video>

<div class="overlay"></div>
<div class="scanlines"></div>
<div class="dust"></div>

<div class="content">
    <div class="status">BROADCAST INTERMISSION</div>
    <div class="title">STANDBY FOR TRANSMISSION<br>GO HYDRATE</div>
    <div class="lore"></div>
</div>
    
<script>
const loreLines = [
    "COMMANDER HAS TEMPORARILY LEFT THE BRIDGE.",
    "LONG RANGE TRANSMISSION RELAY REMAINS ACTIVE.",
    "ALL PRIMARY SYSTEMS OPERATING WITHIN SAFE PARAMETERS.",
    "CREW ACTIVITY DETECTED ACROSS LOCAL STAR SYSTEMS.",
    "INTERMISSION PROTOCOLS NOW IN EFFECT.",
    "DEEP SPACE SIGNAL STABILITY: NOMINAL.",
    "QUANTUM DRIVE SYSTEMS CURRENTLY IDLING.",
    "BROADCAST NETWORK MAINTAINING ORBITAL LINK.",
    "AWAITING RETURN TO ACTIVE FLIGHT OPERATIONS.",
    "NO CRITICAL THREATS DETECTED IN LOCAL SECTOR.",
    "STANDBY FOR FURTHER TRANSMISSION.",
    "COMMUNICATION CHANNELS REMAIN OPEN.",
    "MISSION LOGGING CONTINUES DURING INTERMISSION.",
    "REMOTE SENSORS REPORT CALM CONDITIONS.",
    "THE COMMAND DECK WILL REACTIVATE SHORTLY."
];

let loreIndex = 0;
const loreEl = document.querySelector(".lore");

function typeLore(text, callback) {
    let i = 0;
    loreEl.textContent = "";

    const timer = setInterval(() => {
        loreEl.textContent = text.substring(0, i);
        i++;

        if (i > text.length) {
            clearInterval(timer);
            setTimeout(callback, 8000);
        }
    }, 35);
}

function eraseLore(callback) {
    let text = loreEl.textContent;
    let i = text.length;

    const timer = setInterval(() => {
        loreEl.textContent = text.substring(0, i);
        i--;

        if (i < 0) {
            clearInterval(timer);
            callback();
        }
    }, 18);
}

function playLoreLoop() {
    typeLore(loreLines[loreIndex], () => {
        eraseLore(() => {
            loreIndex = (loreIndex + 1) % loreLines.length;
            playLoreLoop();
        });
    });
}

playLoreLoop();
</script>

<div class="chat-panel">
    <div class="chat-title">LIVE COMMS</div>

    <div id="chatMessages" class="chat-messages"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const chatMessages =
    document.getElementById("chatMessages");

socket.on("connect", () => {

    const row = document.createElement("div");

    row.className = "chat-message new-message";

    row.innerHTML = `
        <div class="chat-meta">
            <span class="chat-user" style="color:${data.color || "#00d9ff"}">
                ${data.user}
            </span>
            <span class="chat-time">${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
        </div>
    
        <div class="chat-text">
            ${renderTwitchMessage(data.message, data.emotes)}
        </div>
    `;

    chatMessages.appendChild(row);

});

function renderTwitchMessage(message, emotes) {

    if (!emotes || Object.keys(emotes).length === 0) {
        return escapeHtml(message);
    }

    let result = escapeHtml(message);

    const replacements = [];

    for (const emoteId in emotes) {

        emotes[emoteId].forEach(position => {

            const [start, end] =
                position.split("-").map(Number);

            replacements.push({
                start,
                end,
                id: emoteId,
                text: message.substring(start, end + 1)
            });

        });

    }

    replacements.sort((a, b) => b.start - a.start);

    replacements.forEach(emote => {

        const img =
            `<img
                class="chat-emote"
                src="https://static-cdn.jtvnw.net/emoticons/v2/${emote.id}/default/dark/2.0"
            >`;

        result =
            result.substring(0, emote.start) +
            img +
            result.substring(emote.end + 1);

    });

    return result;
}

function escapeHtml(text) {
    return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

socket.on("chat-message", (data) => {

    const row = document.createElement("div");

    row.className = "chat-message new-message";

    row.innerHTML = `
        <div class="chat-meta">

            <span
                class="chat-user"
                style="color:${data.color || "#00d9ff"}">

                ${data.user}

            </span>

            <span class="chat-time">

                ${new Date().toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit"
                })}

            </span>

        </div>

        <div class="chat-text">

            ${renderTwitchMessage(
                data.message,
                data.emotes
            )}

        </div>
    `;

    chatMessages.appendChild(row);

    while (chatMessages.children.length > 12) {

        chatMessages.removeChild(
            chatMessages.firstChild
        );

    }

});
</script>
    
</body>
</html>
